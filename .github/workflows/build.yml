name: Compilar y Lanzar Release (CI/CD Tauri)

on:
  push:
    tags:
      - 'v*' # Se dispara en tags que empiecen con v, ej. v1.0.0

permissions:
  contents: write # Permite crear releases y subir los assets a GitHub

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Clonar Repositorio
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Instalar Dependencias de Node
        run: npm install

      - name: Configurar Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Compilar la Aplicación con Tauri y Crear Release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }} # Toma el nombre del tag (ej. v1.0.0)
          releaseName: "Release ${{ github.ref_name }}"
          releaseBody: "Nueva versión compilada automáticamente con Tauri V2."
          releaseDraft: false
          prerelease: false
