name: Compilar y Lanzar Release (CI/CD)

on:
  push:
    tags:
      - 'v*' # Se dispara en tags que empiecen con v, ej. v1.0.0

permissions:
  contents: write # Permite crear releases y subir los assets a GitHub

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Clonar Repositorio
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Instalar Dependencias
        run: npm ci

      - name: Compilar la Aplicación con Electron Builder
        run: npm run dist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Crear Release y Subir Instalador
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            dist/*.exe
            dist/*.blockmap
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
