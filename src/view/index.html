<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Editor Markdown premium con visor interactivo colapsable - WolfTeI" />
    <link rel="stylesheet" href="./bootstrap-icons/bootstrap-icons.css" />
    <link rel="stylesheet" href="./style.css" />
    <title>Editor Markdown</title>
  </head>
  <body class="editor-app">
    <header class="editor-header">
      <section class="editor-header__bar" data-tauri-drag-region>
        <div class="editor-header__section editor-header__section--left">
          <div class="editor-header__logo" aria-label="Logo Markdown"></div>
          <nav class="editor-header__actions">
            <button type="button" id="new" class="editor-header__action-btn" title="Nuevo archivo">
              <i class="bi bi-file-earmark-plus"></i>
            </button>
            <button type="button" id="open" class="editor-header__action-btn" title="Abrir archivo">
              <i class="bi bi-folder2-open"></i>
            </button>
            <button type="button" id="save" class="editor-header__action-btn" title="Guardar archivo">
              <i class="bi bi-floppy"></i>
            </button>
            <button type="button" id="save-as" class="editor-header__action-btn" title="Guardar como">
              <i class="bi bi-floppy2-fill"></i>
            </button>
            <button type="button" id="close-file" class="editor-header__action-btn" title="Cerrar archivo">
              <i class="bi bi-x-square"></i>
            </button>
            <button type="button" id="export" class="editor-header__action-btn" title="Exportar como HTML">
              <i class="bi bi-filetype-html"></i>
            </button>
            <button type="button" id="export-pdf" class="editor-header__action-btn" title="Exportar como PDF">
              <i class="bi bi-filetype-pdf"></i>
            </button>
            <button type="button" id="toggle-view" class="editor-header__action-btn" title="Modo Visor (Colapsar editor)">
              <i class="bi bi-eye"></i>
            </button>
          </nav>
        </div>
        
        <div class="editor-header__section editor-header__section--center">
          <div class="editor-header__title-container">
            <h3 id="titulo" class="editor-header__title">Archivo sin nombre</h3>
          </div>
        </div>

        <div class="editor-header__section editor-header__section--right">
          <div class="editor-header__window-controls">
            <button id="min" class="editor-header__control-btn" title="Minimizar">
              <i class="bi bi-dash-lg"></i>
            </button>
            <button id="max" class="editor-header__control-btn" title="Maximizar">
              <i class="bi bi-square"></i>
            </button>
            <button id="unmax" class="editor-header__control-btn" style="display: none" title="Restaurar">
              <i class="bi bi-back"></i>
            </button>
            <button id="close" class="editor-header__control-btn editor-header__control-btn--close" title="Cerrar">
              <i class="bi bi-x-lg"></i>
            </button>
          </div>
        </div>
      </section>
    </header>
    <main class="editor-workspace">
      <section class="editor-workspace__panel editor-workspace__panel--editor">
        <textarea name="editor" id="editor" class="editor-workspace__textarea" placeholder="Escribí tu Markdown acá..."></textarea>
      </section>
      <section class="editor-workspace__panel editor-workspace__panel--preview">
        <div id="preview" class="editor-workspace__preview-content"></div>
      </section>
    </main>

    <script src="./script.js"></script>
  </body>
</html>
